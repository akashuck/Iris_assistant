name: Build Iris APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - run: ./gradlew assembleDebug

    - uses: actions/upload-artifact@v3
      with:
        name: Iris-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
